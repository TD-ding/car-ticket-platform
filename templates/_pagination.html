{% macro render_pagination(pagination) %}
{% if pagination.pages > 1 %}
<div class="pagination">
    {% if pagination.has_prev %}
    <a href="{{ url_for(request.endpoint, **dict(request.args, page=pagination.prev_num)) }}" class="btn btn-sm btn-outline">&laquo; 上一页</a>
    {% endif %}
    <span class="page-info">第 {{ pagination.page }} / {{ pagination.pages }} 页</span>
    {% if pagination.has_next %}
    <a href="{{ url_for(request.endpoint, **dict(request.args, page=pagination.next_num)) }}" class="btn btn-sm btn-outline">下一页 &raquo;</a>
    {% endif %}
</div>
{% endif %}
{% endmacro %}
