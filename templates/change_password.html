{% extends "base.html" %}
{% block title %}修改密码 - 汽车订票平台{% endblock %}

{% block content %}
<div class="auth-form">
    <h2>修改密码</h2>
    <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="form-group">
            <label>当前密码</label>
            <input type="password" name="old_password" required placeholder="请输入当前密码">
        </div>
        <div class="form-group">
            <label>新密码</label>
            <input type="password" name="new_password" required placeholder="至少6位">
        </div>
        <div class="form-group">
            <label>确认新密码</label>
            <input type="password" name="confirm_password" required placeholder="再次输入新密码">
        </div>
        <button type="submit" class="btn btn-primary btn-block">修改密码</button>
    </form>
    <p class="text-center mt-2">
        <a href="{{ url_for('profile') }}">返回个人资料</a>
    </p>
</div>
{% endblock %}
