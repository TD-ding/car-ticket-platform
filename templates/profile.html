{% extends "base.html" %}
{% block title %}个人资料 - 汽车订票平台{% endblock %}

{% block content %}
<div class="auth-form">
    <h2>个人资料</h2>
    <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="form-group">
            <label>用户名</label>
            <input type="text" value="{{ current_user.username }}" disabled class="input-disabled">
        </div>
        <div class="form-group">
            <label>真实姓名</label>
            <input type="text" name="real_name" placeholder="请输入姓名"
                   value="{{ current_user.real_name or '' }}">
        </div>
        <div class="form-group">
            <label>手机号码</label>
            <input type="text" name="phone" placeholder="请输入手机号"
                   value="{{ current_user.phone or '' }}">
        </div>
        <div class="form-group">
            <label>邮箱</label>
            <input type="email" name="email" placeholder="请输入邮箱"
                   value="{{ current_user.email or '' }}">
        </div>
        <button type="submit" class="btn btn-primary btn-block">保存修改</button>
    </form>
    <p class="text-center mt-2">
        <a href="{{ url_for('change_password') }}">修改密码</a>
    </p>
</div>
{% endblock %}
