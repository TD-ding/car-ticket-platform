services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///instance/car_ticket.db}
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-4}
    volumes:
      - db-data:/app/instance
    restart: unless-stopped

volumes:
  db-data:
